name: Publish cobalt-tool-frontend-host

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/frontend-container.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "packages/version-info/**"
      - "web/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cobalt-tool-frontend-host

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release metadata
        id: release-meta
        run: |
          version=$(jq -r .version web/package.json)
          echo "commit_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major_version=$(echo "$version" | cut -d. -f1)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release-meta.outputs.version }}
            type=raw,value=${{ steps.release-meta.outputs.major_version }}
            type=raw,value=${{ steps.release-meta.outputs.version }}-${{ steps.release-meta.outputs.commit_short }}
          labels: |
            org.opencontainers.image.title=cobalt-tool-frontend-host
            org.opencontainers.image.description=Static container image for the cobalt web frontend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Visibility note
        run: |
          echo "Container published to ghcr.io/${{ env.IMAGE_NAME }}."
          echo "GitHub's official package docs do not provide a workflow API for changing first-publish package visibility."
          echo "If the package is still private after the first run, open the package settings in GitHub and change visibility to Public once."
